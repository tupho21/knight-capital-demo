name: Knight Capital Advanced Guard
on: [push, pull_request]
jobs:
  comprehensive-check:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lấy mã nguồn (Checkout)
       	uses: actions/checkout@v3	# SonarCloud cần lịch sử commit đầy đủ để phân tích
	with:
         	fetch-depth: 0
      
	- name: 2. Thiết lập Java JDK 17
       	uses: actions/setup-java@v3
	with:
          	java-version: '17'
          	distribution: 'temurin'
          	cache: 'maven'
	
	# LỚP BẢO VỆ 1: QUÉT NHANH
      	# Mục tiêu: Phát hiện ngay lập tức các từ khóa "nguy hiểm" đã biết
	- name: Layer 1 - Custom Script Scan (Fast Fail)
        	run: |
          	echo "🔍 Đang quét từ khóa nhạy cảm..."
          	if grep -r "activatePowerPegMode" src/main/java; then
            	echo "❌ CẢNH BÁO: Phát hiện hàm Power Peg cũ! Dừng Pipeline ngay lập tức."
            	exit 1
          	fi
	# LỚP BẢO VỆ 2: PHÂN TÍCH SÂU
      	# Mục tiêu: Phát hiện mã nguồn chết, nợ kỹ thuật và lỗi logic ngay cả khi Dev đổi tên hàm.
      	- name: Layer 2 - SonarCloud Analysis (Deep Scan)
	# SonarCloud tự động phát hiện "Unused Private Method" hoặc "Unreachable Code"
        	env:
          	GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          	SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        	run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Tên_Project_Của_Bạn

      	# BƯỚC CUỐI: ĐÓNG GÓI (Chỉ chạy nếu 2 lớp trên đã PASS)
      	- name: 3. Đóng gói sản phẩm (Build Artifact)
        	run: mvn -B package --file pom.xml
